services:
  # ─── N8N Workflow Engine ───────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.76.1
    container_name: mitra-n8n
    restart: unless-stopped
    user: "node"
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - NODE_ENV=production
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Kolkata}
      - TZ=${TIMEZONE:-Asia/Kolkata}
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-mitra_n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # Execution settings
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_METRICS=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./credentials:/credentials:ro
      - ./workflows:/workflows:ro
    networks:
      - mitra-network
      - mitra-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mitra-postgres
    restart: unless-stopped
    user: "postgres"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mitra_n8n}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mitra-internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-mitra_n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis (AI Agent Memory & Caching) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mitra-redis
    restart: unless-stopped
    user: "redis"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --save 60 100
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - mitra-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Health Bridge (Apple Health Data Receiver) ────────────────
  health-bridge:
    build:
      context: ./health-bridge
      dockerfile: Dockerfile
    container_name: mitra-health-bridge
    restart: unless-stopped
    ports:
      - "${HEALTH_BRIDGE_BIND:-0.0.0.0}:8085:8085"
    environment:
      - API_KEY=${HEALTH_BRIDGE_API_KEY}
      - TZ=${TIMEZONE:-Asia/Kolkata}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - health_data:/app/data
    networks:
      - mitra-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8085/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Automated Backups ────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: mitra-backup
    restart: "no"
    entrypoint: /bin/sh
    command: >
      -c "
      pg_dump -h postgres -U $${POSTGRES_USER:-n8n} -d $${POSTGRES_DB:-mitra_n8n}
      --format=custom
      --file=/backups/mitra_$$(date +%Y%m%d_%H%M%S).dump
      && echo 'Backup completed successfully'
      && ls -la /backups/
      "
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_DB=${POSTGRES_DB:-mitra_n8n}
    volumes:
      - ./backups:/backups
    networks:
      - mitra-internal
    profiles:
      - backup
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  health_data:
    driver: local

networks:
  mitra-network:
    driver: bridge
    name: mitra-network
  mitra-internal:
    driver: bridge
    name: mitra-internal
    internal: true
